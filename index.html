<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --bg-ambient-1: rgba(173, 198, 224, 0.58);
        --bg-ambient-2: rgba(232, 193, 164, 0.48);
        --bg-ambient-base-1: #f8fafc;
        --bg-ambient-base-2: #f2eee8;
        --panel-bg: #f3f3f3;
        --panel-line: #d6d6d6;
        --spinner-track: #bdbdbd;
        --spinner-head: #3f3f3f;
        --braille-spinner: #4a4a4a;
        --ease-utility: cubic-bezier(0.22, 1, 0.36, 1);
        --ease-decorative: cubic-bezier(0.77, 0, 0.175, 1);
        --duration-utility-fast: 120ms;
        --duration-utility: 180ms;
        --duration-decorative: 4.8s;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        overflow: hidden;
        background: linear-gradient(140deg, var(--bg-ambient-base-1) 0%, var(--bg-ambient-base-2) 100%);
        font-family: "Inter", "Segoe UI", sans-serif;
        position: relative;
      }

      #app {
        position: relative;
        z-index: 1;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -24%;
        pointer-events: none;
      }

      body::before {
        z-index: 0;
        opacity: 0.94;
        background:
          radial-gradient(52% 46% at 16% 20%, var(--bg-ambient-1) 0%, rgba(255, 255, 255, 0) 66%),
          radial-gradient(46% 42% at 82% 72%, var(--bg-ambient-2) 0%, rgba(255, 255, 255, 0) 68%);
        animation: ambientOrbit 16s linear infinite;
      }

      body::after {
        z-index: 0;
        opacity: 0.26;
        background-image: radial-gradient(rgba(20, 24, 31, 0.11) 0.6px, transparent 0.6px);
        background-size: 2px 2px;
        animation: ambientGrain 4.8s steps(10, end) infinite;
      }

      body[data-motion="calm"] {
        --duration-utility-fast: 96ms;
        --duration-utility: 140ms;
        --duration-decorative: 7.2s;
      }

      .loading-card {
        position: fixed;
        width: 180px;
        height: 80px;
        border-radius: 16px;
        border: 1px solid var(--panel-line);
        background: var(--panel-bg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        display: grid;
        place-items: center;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .loading-suite-panel {
        position: fixed;
        width: 180px;
        border-radius: 16px;
        border: 1px solid var(--panel-line);
        background: rgba(243, 243, 243, 0.94);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .loading-suite-panel.dragging {
        cursor: grabbing;
      }

      .loading-suite-row {
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 12px;
      }

      .loading-suite-row + .loading-suite-row {
        border-top: 1px solid rgba(0, 0, 0, 0.08);
      }

      .braille-panel {
        position: fixed;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 44px;
        width: 180px;
        height: 80px;
        border-radius: 16px;
        border: 1px solid var(--panel-line);
        background: var(--panel-bg);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        color: var(--braille-spinner);
        user-select: none;
        pointer-events: auto;
        cursor: grab;
        touch-action: none;
      }

      .dot-pulse-floating {
        position: fixed;
        pointer-events: auto;
        cursor: grab;
        touch-action: none;
      }

      .dot-pulse-floating.dragging {
        cursor: grabbing;
      }

      .braille-panel.dragging {
        cursor: grabbing;
      }

      .braille-slot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 28px;
      }

      .loading-braille {
        font-family: "IBM Plex Mono", "SF Mono", "JetBrains Mono", "Cascadia Mono", monospace;
        font-size: 20px;
        line-height: 1;
        letter-spacing: 0;
        text-rendering: geometricPrecision;
      }

      .loading-braille-trail {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.1ch;
        height: 1em;
      }

      .loading-braille-layer {
        position: absolute;
        inset: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .loading-braille-ghost-1 {
        opacity: 0.58;
        transform: translateX(-0.015em);
      }

      .loading-braille-ghost-2 {
        opacity: 0.3;
        transform: translateX(-0.03em);
      }

      .loading-braille-ghost-3 {
        opacity: 0.14;
        transform: translateX(-0.045em);
      }

      .dot-pulse-panel {
        width: 180px;
        height: 80px;
        border-radius: 14px;
        border: 1px solid var(--panel-line);
        background: color-mix(in srgb, var(--panel-bg) 82%, white 18%);
        box-shadow: 0 2px 7px rgba(0, 0, 0, 0.07);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .dot-pulse {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .dot-pulse-dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--braille-spinner) 92%, white 8%);
        opacity: 0.16;
        box-shadow: 0 0 0 0.5px color-mix(in srgb, var(--braille-spinner) 28%, transparent);
        animation: dotPulse 920ms steps(1, end) infinite;
      }

      .dot-pulse-dot:nth-child(2) {
        animation-delay: 120ms;
      }

      .dot-pulse-dot:nth-child(3) {
        animation-delay: 240ms;
      }

      .dot-matrix {
        display: inline-grid;
        gap: 2px;
        align-items: center;
        justify-items: center;
      }

      .dot-matrix-3x3 {
        grid-template-columns: repeat(3, 3px);
      }

      .dot-matrix-dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--braille-spinner) 94%, white 6%);
        opacity: 0.12;
        box-shadow: 0 0 0 0.5px color-mix(in srgb, var(--braille-spinner) 22%, transparent);
      }

      .dot-matrix-3x3 .dot-matrix-dot {
        animation: dotMatrixScan 1500ms steps(1, end) infinite;
      }

      .dot-matrix-3x3 .dot-matrix-dot:nth-child(1) { animation-delay: 0ms; }
      .dot-matrix-3x3 .dot-matrix-dot:nth-child(2) { animation-delay: 70ms; }
      .dot-matrix-3x3 .dot-matrix-dot:nth-child(3) { animation-delay: 140ms; }
      .dot-matrix-3x3 .dot-matrix-dot:nth-child(4) { animation-delay: 280ms; }
      .dot-matrix-3x3 .dot-matrix-dot:nth-child(5) { animation-delay: 350ms; }
      .dot-matrix-3x3 .dot-matrix-dot:nth-child(6) { animation-delay: 420ms; }
      .dot-matrix-3x3 .dot-matrix-dot:nth-child(7) { animation-delay: 560ms; }
      .dot-matrix-3x3 .dot-matrix-dot:nth-child(8) { animation-delay: 630ms; }
      .dot-matrix-3x3 .dot-matrix-dot:nth-child(9) { animation-delay: 700ms; }

      .top-progress {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 1.5px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--panel-bg) 86%, white 14%);
        overflow: hidden;
        z-index: 4;
      }

      .top-progress-bar {
        position: absolute;
        top: 0;
        left: -38%;
        width: 28%;
        height: 100%;
        border-radius: inherit;
        background: #9a9a9a;
        animation: indeterminateSlide 4.5s linear infinite;
      }

      body[data-motion="calm"] .loading-braille-ghost-1 {
        opacity: 0.42;
      }

      body[data-motion="calm"] .loading-braille-ghost-2 {
        opacity: 0.22;
      }

      body[data-motion="calm"] .loading-braille-ghost-3 {
        opacity: 0.1;
      }

      .curated-title {
        position: fixed;
        padding: 0;
        color: #171717;
        font-family: "Roboto Flex", "Inter", sans-serif;
        font-size: 28px;
        font-weight: 520;
        letter-spacing: -0.015em;
        line-height: 1;
        cursor: grab;
        user-select: none;
        touch-action: none;
        will-change: transform;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        font-optical-sizing: auto;
        font-variation-settings: "opsz" 28, "wght" 540;
        animation: curatedPulse 3.8s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      }

      .curated-title.dragging {
        cursor: grabbing;
      }

      .loading-card.dragging {
        cursor: grabbing;
      }

      .spinners {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 47px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 3px solid var(--spinner-track);
        border-top-color: var(--spinner-head);
        animation: spin 760ms linear infinite;
      }

      .spinner:first-child {
        animation-duration: 1520ms;
      }

      .spinner:nth-child(2) {
        animation-duration: 820ms;
      }

      .toast-panel {
        position: fixed;
        width: min(420px, calc(100vw - 44px));
        border-radius: 14px;
        border: 1px solid var(--panel-line);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px) saturate(120%);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .toast-panel.dragging {
        cursor: grabbing;
      }

      .toast-stage {
        position: relative;
        height: 170px;
        border-bottom: 1px solid var(--panel-line);
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .toast-layer {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        padding: 14px;
      }

      .toast-layer.idle-breathe {
        animation: toastIdleBreathe 4.6s var(--ease-decorative) infinite;
      }

      .toast-item {
        position: absolute;
        left: 14px;
        right: 14px;
        top: 50%;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid #dbdbdb;
        background: #f8f8f8;
        padding: 12px 14px;
        color: #1d1d1d;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.3;
        letter-spacing: -0.005em;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.05),
          0 10px 24px rgba(0, 0, 0, 0.09);
      }

      .toast-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 12px;
      }

      .toast-controls-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toast-controls-right {
        display: flex;
        align-items: center;
        gap: 10px;
        align-self: center;
      }

      .toast-control {
        --mx: 0px;
        --my: 0px;
        height: 36px;
        min-width: 96px;
        padding: 0 10px;
        border: 1px solid var(--panel-line);
        border-radius: 9px;
        background: #f8f8f8;
        color: #232323;
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.005em;
        cursor: pointer;
        transform: translate3d(var(--mx), var(--my), 0);
        transition:
          transform var(--duration-utility-fast) var(--ease-utility),
          background var(--duration-utility) var(--ease-utility),
          box-shadow var(--duration-utility) var(--ease-utility);
      }

      .toast-control:hover {
        background: #efefef;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      }

      .toast-control:active {
        transform: translate3d(var(--mx), var(--my), 0) scale(0.975);
      }

      .toast-reset {
        height: 36px;
        min-width: auto;
        padding: 0 4px;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        color: #b25e5e;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .toast-reset:hover {
        background: transparent;
        box-shadow: none;
        color: #9f4d4d;
      }

      .toast-reset:active {
        transform: translate3d(var(--mx), var(--my), 0) scale(0.985);
      }

      .toast-select-wrap {
        position: relative;
      }

      .toast-select-wrap::after {
        content: "";
        position: absolute;
        right: 11px;
        top: 50%;
        width: 6px;
        height: 6px;
        border-right: 1.8px solid #111;
        border-bottom: 1.8px solid #111;
        transform: translateY(-62%) rotate(45deg);
        pointer-events: none;
      }

      .diff-panel {
        position: fixed;
        width: min(320px, calc(100vw - 44px));
        border-radius: 14px;
        border: 1px solid var(--panel-line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(8px) saturate(120%);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .diff-panel.dragging {
        cursor: grabbing;
      }

      .diff-stage {
        position: relative;
        height: 170px;
        border-bottom: 1px solid var(--panel-line);
        overflow: hidden;
      }

      .diff-view {
        position: absolute;
        inset: 0;
        padding: 16px;
      }

      .diff-before {
        background: linear-gradient(145deg, #f1f1f1 0%, #e6e6e6 100%);
      }

      .diff-after {
        background: linear-gradient(145deg, #dfebe2 0%, #d1e4d6 100%);
      }

      .diff-image-frame {
        height: 100%;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.9);
        padding: 8px;
        overflow: hidden;
      }

      .diff-image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
      }

      .diff-after-clip {
        clip-path: inset(0 calc(100% - var(--reveal, 50%)) 0 0);
      }

      .diff-handle {
        position: absolute;
        top: 0;
        bottom: 0;
        left: var(--reveal, 50%);
        width: 24px;
        transform: translateX(-50%);
        border-left: 1px solid rgba(21, 21, 21, 0.55);
        pointer-events: auto;
        touch-action: none;
        cursor: ew-resize;
      }

      .diff-handle::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #2f2f2f;
        border: 2px solid rgba(255, 255, 255, 0.92);
        transform: translate(-50%, -50%);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.22);
      }

      .diff-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 12px;
      }

      .diff-instruction {
        margin: 0;
        color: #5a5a5a;
        font-size: 12px;
        line-height: 1.3;
      }

      .modal-demo-button {
        position: fixed;
        right: 20px;
        bottom: 20px;
        height: 40px;
        padding: 0 14px;
        border: 1px solid var(--panel-line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(4px);
        color: #1e1e1e;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.005em;
        cursor: pointer;
        transition:
          transform 140ms cubic-bezier(0.23, 1, 0.32, 1),
          background 180ms var(--ease-utility),
          box-shadow 180ms var(--ease-utility);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 8px 20px rgba(0, 0, 0, 0.06);
        z-index: 6;
      }

      .motion-example-panel {
        position: fixed;
        width: min(380px, calc(100vw - 40px));
        border-radius: 14px;
        border: 1px solid var(--panel-line);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px) saturate(120%);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        z-index: 6;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      .motion-example-panel.dragging {
        cursor: grabbing;
      }

      .motion-example-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px 8px;
        border-bottom: 1px solid #e3e3e3;
      }

      .motion-example-title {
        margin: 0;
        color: #1f1f1f;
        font-size: 13px;
        font-weight: 650;
        letter-spacing: -0.005em;
      }

      .motion-example-counter {
        color: #6a6a6a;
        font-size: 11px;
        font-family: "IBM Plex Mono", "SF Mono", "JetBrains Mono", monospace;
      }

      .motion-example-stage {
        min-height: 130px;
        display: grid;
        place-items: center;
        padding: 16px 12px;
        background: linear-gradient(160deg, #f7f7f7 0%, #efefef 100%);
      }

      .motion-example-block {
        width: 120px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid #d7d7d7;
        background: #ffffff;
        display: grid;
        place-items: center;
        font-size: 12px;
        color: #333;
        font-weight: 600;
      }

      .motion-example-list {
        width: min(240px, 100%);
        display: grid;
        gap: 6px;
      }

      .motion-example-row {
        border: 1px solid #d7d7d7;
        border-radius: 8px;
        background: #ffffff;
        color: #333;
        font-size: 12px;
        padding: 8px 10px;
      }

      .motion-example-toast {
        width: min(240px, 100%);
        border-radius: 10px;
        border: 1px solid #d7d7d7;
        background: #ffffff;
        color: #333;
        font-size: 12px;
        padding: 10px 12px;
      }

      .motion-example-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-top: 1px solid #e3e3e3;
      }

      .motion-skeleton {
        width: 240px;
        max-width: 100%;
        display: grid;
        gap: 8px;
        justify-self: center;
      }

      .skeleton-line {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(100deg, #e3e3e3 24%, #efefef 50%, #e3e3e3 76%);
        background-size: 240% 100%;
        animation: skeletonShimmer 2.2s cubic-bezier(0.33, 1, 0.68, 1) infinite;
        border: 1px solid #d9d9d9;
      }

      .skeleton-line.short {
        width: 58%;
        justify-self: start;
      }

      .skeleton-line.medium {
        width: 74%;
        justify-self: start;
      }

      .motion-progress {
        width: 250px;
        max-width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        justify-self: center;
      }

      .progress-step {
        flex: 1;
        height: 8px;
        border-radius: 999px;
        background: #d2d2d2;
        overflow: hidden;
        border: 1px solid #c8c8c8;
      }

      .progress-step-fill {
        width: 100%;
        height: 100%;
        background: #242424;
        transform-origin: left center;
      }

      .motion-success {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 1px solid #d5d5d5;
        background: #ffffff;
        display: grid;
        place-items: center;
      }

      .motion-success-icon {
        width: 32px;
        height: 32px;
      }

      .modal-demo-button:hover {
        background: rgba(255, 255, 255, 0.96);
      }

      .modal-demo-button:active {
        transform: scale(0.97);
      }

      .ek-modal-overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 14px;
        z-index: 9;
      }

      .ek-modal-bloom {
        position: absolute;
        inset: 0;
        background: rgba(24, 24, 24, 0.3);
        backdrop-filter: blur(4px);
      }

      .ek-modal-card {
        position: relative;
        width: min(470px, calc(100vw - 28px));
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(250, 250, 250, 0.94);
        box-shadow:
          0 2px 6px rgba(0, 0, 0, 0.08),
          0 24px 54px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .ek-modal-head {
        padding: 16px 16px 10px;
      }

      .ek-modal-title {
        margin: 0;
        color: #171717;
        font-size: 18px;
        font-weight: 650;

        const prev = () => setIndex((prev) => (prev - 1 + SIMPLE_MOTION_LIST.length) % SIMPLE_MOTION_LIST.length);
        const stopDragOnControl = (event) => event.stopPropagation();

        const renderExample = () => {
          if (current.id === "skeleton") {
            return React.createElement(
              "div",
              { className: "motion-skeleton" },
              React.createElement("div", { className: "skeleton-line" }),
              React.createElement("div", { className: "skeleton-line medium" }),
              React.createElement("div", { className: "skeleton-line short" })
            );
          }

          if (current.id === "progress") {
            return React.createElement(
              "div",
              { className: "motion-progress" },
              [0, 1, 2].map((step) =>
                React.createElement(
                  "div",
                  { key: `step-${step}`, className: "progress-step" },
                  React.createElement(motion.div, {
                    className: "progress-step-fill",
                    initial: false,
                    animate: {
                      scaleX: step <= progressStep ? 1 : 0,
                      opacity: step <= progressStep ? 1 : 0.18
                    },
                    transition: {
                      duration: 0.9,
                      ease: [0.32, 0.72, 0, 1]
                    }
                  })
                )
              )
            );
          }

          if (current.id === "success") {
            return React.createElement(
              "div",
              { className: "motion-success" },
              React.createElement(
                motion.svg,
                {
                  className: "motion-success-icon",
                  viewBox: "0 0 24 24",
                  fill: "none",
                  initial: false
                },
                React.createElement(motion.circle, {
                  cx: "12",
                  cy: "12",
                  r: "9",
                  stroke: "#1f1f1f",
                  strokeWidth: "1.5",
                  initial: { pathLength: 0, opacity: 0.5 },
                  animate: { pathLength: showSuccess ? 1 : 0, opacity: showSuccess ? 1 : 0.5 },
                  transition: { duration: 0.36, ease: [0.22, 1, 0.36, 1] }
                }),
                React.createElement(motion.path, {
                  d: "M7 12.5l3.1 3.1L17 8.8",
                  stroke: "#1f1f1f",
                  strokeWidth: "1.9",
                  strokeLinecap: "round",
                  strokeLinejoin: "round",
                  initial: { pathLength: 0, opacity: 0 },
                  animate: { pathLength: showSuccess ? 1 : 0, opacity: showSuccess ? 1 : 0 },
                  transition: { duration: 0.5, delay: 0.08, ease: [0.22, 1, 0.36, 1] }
                })
              )
            );
          }

          return React.createElement(
            motion.div,
            {
              key: `demo-${current.name}-${index}`,
              className: "motion-example-block",
              initial: current.name === "Page Enter" ? { opacity: 0, y: 12 } : { opacity: 1, y: 0, scale: 1 },
              animate: { opacity: 1, y: 0, scale: 1 },
              whileHover: current.name === "Hover Lift" ? { y: -3, scale: 1.02 } : undefined,
              whileTap: current.name === "Press Down" ? { scale: 0.96 } : undefined,
              transition: {
                duration: current.name === "Page Enter" ? 0.42 : current.name === "Press Down" ? 0.11 : 0.16,
                ease: [0.22, 1, 0.36, 1]
              }
            },
            current.name
          );
        };

        return React.createElement(
          React.Fragment,
          null,
          React.createElement(
            motion.section,
            {
              ref: drag.ref,
              className: `motion-example-panel${drag.dragging ? " dragging" : ""}`,
              style: { left: `${drag.pos.x}px`, top: `${drag.pos.y}px` },
              onPointerDown: drag.onPointerDown,
              initial: { opacity: 0, y: 10, scale: 0.99 },
              animate: { opacity: entranceReady ? 1 : 0, y: entranceReady ? 0 : 10, scale: entranceReady ? 1 : 0.99 },
              transition: {
                duration: motionMode === "calm" ? 0.34 : 0.42,
                delay: motionMode === "calm" ? 0.12 : 0.16,
                ease: [0.22, 1, 0.36, 1]
              }
            },
            React.createElement(
              "header",
              { className: "motion-example-head" },
              React.createElement("h2", { className: "motion-example-title" }, current.name),
              React.createElement("span", { className: "motion-example-counter" }, `${index + 1}/${SIMPLE_MOTION_LIST.length}`)
            ),
            React.createElement(
              "div",
              { className: "motion-example-stage" },
              React.createElement(
                AnimatePresence,
                { mode: "wait" },
                React.createElement(
                  motion.div,
                  {
                    key: `example-stage-${current.name}-${index}`,
                    initial: { opacity: 0, y: 6 },
                    animate: { opacity: 1, y: 0 },
                    exit: { opacity: 0, y: -6 },
                    transition: { duration: 0.2, ease: [0.22, 1, 0.36, 1] }
                  },
                  renderExample()
                )
              )
            )
            ,
            React.createElement(
              "div",
              { className: "motion-example-controls" },
              React.createElement(
                "button",
                { className: "toast-control", type: "button", onPointerDown: stopDragOnControl, onClick: prev },
                "Prev"
              ),
              React.createElement(
                "button",
                { className: "toast-control", type: "button", onPointerDown: stopDragOnControl, onClick: next },
                "Next"
              )
            )
          )
        );
      }

      function App() {
        const motionMode = "normal";
        const [entranceReady, setEntranceReady] = useState(false);

        useEffect(() => {
          const id = requestAnimationFrame(() => setEntranceReady(true));
          return () => cancelAnimationFrame(id);
        }, []);

        return React.createElement(
          React.Fragment,
          null,
          React.createElement(TopCornerProgress, { motionMode, entranceReady }),
          React.createElement(CuratedTitle, { motionMode, entranceReady }),
          React.createElement(UnifiedLoadingPanel, { motionMode, entranceReady }),
          React.createElement(ToastPanel, { motionMode, entranceReady }),
          React.createElement(MotionExamples, { motionMode, entranceReady }),
          React.createElement(EmilModalDemo)
        );
      }

      createRoot(document.getElementById("app")).render(React.createElement(App));
    </script>
  </body>
</html>
